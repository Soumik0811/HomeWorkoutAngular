<section class="card month-card fade-in">
  <div class="month-header">
    <div>
      <p class="eyebrow">30-day tracker</p>
      <h3>Consistency calendar</h3>
    </div>
    <div class="legend">
      <span>✔ Complete</span>
      <span>Today</span>
      <span>✖ Missed</span>
    </div>
  </div>

  <div class="month-grid">
    <article *ngFor="let day of days" [class]="day.status">
      <span class="day-number">Day {{ day.plan.dayNumber }}</span>
      <strong>{{ day.plan.shortLabel }}</strong>
      <span class="status-label">
        <ng-container [ngSwitch]="day.status">
          <span *ngSwitchCase="'complete'">✔</span>
          <span *ngSwitchCase="'missed'">✖</span>
          <span *ngSwitchCase="'today'">Today</span>
          <span *ngSwitchDefault>○</span>
        </ng-container>
      </span>
    </article>
  </div>
</section>
